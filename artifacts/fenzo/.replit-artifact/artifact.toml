kind = "web"
previewPath = "/"
title = "FENZO"
version = "1.0.0"
id = "artifacts/fenzo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21966

[services.development]
run = "pnpm --filter @workspace/fenzo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fenzo", "run", "build" ]
publicDir = "artifacts/fenzo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21966"
BASE_PATH = "/"
